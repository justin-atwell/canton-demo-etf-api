spring:
  application:
    name: canton-etf-fix

server:
  port: 8082

canton:
  ledger:
    host: ${CANTON_LEDGER_HOST:localhost}
    port: ${CANTON_LEDGER_PORT:6865}
  nbbo:
    interval: ${NBBO_INTERVAL:5000}
  market-maker:
    party-id: ${MARKET_MAKER_PARTY_ID:MarketMaker::122098c1ad5e25e586fa2b430a016c2f67a8718cc26ae8ce39529c84a9c6614f2246}

polygon:
  api:
    key: ${POLYGON_API_KEY:your-api-key-here}

auth0:
  issuer: ${AUTH0_ISSUER:https://your-tenant.auth0.com/}
  audience: ${AUTH0_AUDIENCE:https://canton-etf-api}

quickfix:
  config: ${QUICKFIX_CONFIG:config/quickfix.cfg}

logging:
  level:
    com.canton.etf: DEBUG